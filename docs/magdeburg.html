<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magdeburg - Wohngemeinschaft Kandidaten</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <div class="breadcrumb"><a href="index.html">← Zurück zur Übersicht</a></div>
        <h1>🌊 Magdeburg - 0 Kandidaten</h1>
        <p class="header-meta">0 mit Foto • 0 ohne Foto • 0 Kauf • 0 Miete</p>
    </header>

    <div class="container">
        
        
    <div class="filter-bar" id="filterBar">
        <div class="filter-group">
            <label>Typ:</label>
            <button class="filter-btn active" data-filter="all">Alle (0)</button>
            <button class="filter-btn" data-filter="buy">Kauf (0)</button>
            <button class="filter-btn" data-filter="rent">Miete (0)</button>
        </div>
        <div class="filter-group">
            <label>Sortieren:</label>
            <select class="sort-select" id="sortSelect">
                <option value="score">Bewertung (hoch → niedrig)</option>
                <option value="price-asc">Preis (niedrig → hoch)</option>
                <option value="price-desc">Preis (hoch → niedrig)</option>
                <option value="size">Größe (groß → klein)</option>
                <option value="id">ID (A → Z)</option>
            </select>
        </div>
        <div class="filter-group search-group">
            <label>Suche:</label>
            <input type="text" class="search-input" id="searchInput" placeholder="Titel oder Ort...">
            <button class="clear-btn" id="clearSearch">✕</button>
        </div>
    </div>
        <div class="candidates-grid" id="candidatesGrid">
            
        </div>
        <div class="no-results" id="noResults" style="display: none;">
            <p>Keine Immobilien gefunden, die den Filterkriterien entsprechen.</p>
        </div>
    </div>

    <footer class="page-footer">
        <p>Generiert am 2026-02-25 00:00 • Daten aus candidates_enriched.json</p>
    </footer>
    
    <script src="js/filters.js"></script>
    <script src="js/gallery.js"></script>
    
    <script>
    // Description toggle functionality
    function toggleDescription(listingId) {
        const shortDesc = document.getElementById(`desc-short-${listingId}`);
        const fullDesc = document.getElementById(`desc-full-${listingId}`);
        
        if (shortDesc.style.display !== 'none') {
            shortDesc.style.display = 'none';
            fullDesc.style.display = 'block';
        } else {
            shortDesc.style.display = 'block';
            fullDesc.style.display = 'none';
        }
    }
    </script>
    
    <style>
    .read-more-btn {
        background: none;
        border: none;
        color: #0066cc;
        cursor: pointer;
        font-size: inherit;
        text-decoration: underline;
        margin-left: 5px;
        padding: 0;
    }
    
    .read-more-btn:hover {
        color: #004499;
    }
    
    .candidate-description-container {
        margin-bottom: 10px;
    }
    </style>
    
</body>
</html>
